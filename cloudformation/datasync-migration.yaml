AWSTemplateFormatVersion: '2010-09-09'
Description: Hybrid data migration starter using AWS DataSync and Amazon S3

Parameters:
  ProjectName:
    Type: String
    Default: hybrid-data-migration

  DataSyncAgentArn:
    Type: String
    Description: ARN of an existing AWS DataSync agent connected to the on-premises environment

  NfsServerHostname:
    Type: String
    Description: DNS name or IP address of the on-premises NFS server

  NfsExportPath:
    Type: String
    Default: /export/data
    Description: Export path on the NFS server

  NfsMountVersion:
    Type: String
    Default: AUTOMATIC
    AllowedValues:
      - AUTOMATIC
      - NFS3
      - NFS4_0
      - NFS4_1
    Description: NFS version used by DataSync to mount the NFS export

  S3DestinationSubdirectory:
    Type: String
    Default: migration-output
    Description: Prefix inside the destination S3 bucket for migrated data

Resources:
  MigrationBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-bucket'
        - Key: Purpose
          Value: migration-destination
        - Key: ManagedBy
          Value: CloudFormation

  DataSyncS3AccessRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role that AWS DataSync assumes to access the destination S3 bucket
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowDataSyncAssumeRole
            Effect: Allow
            Principal:
              Service: datasync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: s3-access-for-datasync
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BucketAccess
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                Resource: !GetAtt MigrationBucket.Arn
              - Sid: ObjectAccess
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:GetObjectTagging
                  - s3:GetObjectVersion
                  - s3:GetObjectVersionTagging
                  - s3:ListMultipartUploadParts
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub '${MigrationBucket.Arn}/*'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-datasync-s3-role'
        - Key: Purpose
          Value: migration-access
        - Key: ManagedBy
          Value: CloudFormation

  OnPremNfsLocation:
    Type: AWS::DataSync::LocationNFS
    Properties:
      ServerHostname: !Ref NfsServerHostname
      Subdirectory: !Ref NfsExportPath
      OnPremConfig:
        AgentArns:
          - !Ref DataSyncAgentArn
      MountOptions:
        Version: !Ref NfsMountVersion
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nfs-source'
        - Key: Purpose
          Value: migration-source
        - Key: ManagedBy
          Value: CloudFormation

  S3DestinationLocation:
    Type: AWS::DataSync::LocationS3
    Properties:
      S3BucketArn: !GetAtt MigrationBucket.Arn
      S3Config:
        BucketAccessRoleArn: !GetAtt DataSyncS3AccessRole.Arn
      S3StorageClass: STANDARD
      Subdirectory: !Ref S3DestinationSubdirectory
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-s3-destination'
        - Key: Purpose
          Value: migration-destination
        - Key: ManagedBy
          Value: CloudFormation

  DataMigrationTask:
    Type: AWS::DataSync::Task
    Properties:
      Name: !Sub '${ProjectName}-task'
      SourceLocationArn: !Ref OnPremNfsLocation
      DestinationLocationArn: !Ref S3DestinationLocation
      Options:
        VerifyMode: ONLY_FILES_TRANSFERRED
        TransferMode: CHANGED
        PreserveDeletedFiles: PRESERVE
        OverwriteMode: ALWAYS
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-datasync-task'
        - Key: Purpose
          Value: migration-task
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  BucketName:
    Description: Destination S3 bucket
    Value: !Ref MigrationBucket

  BucketArn:
    Description: Destination S3 bucket ARN
    Value: !GetAtt MigrationBucket.Arn

  SourceLocationArn:
    Description: DataSync source NFS location ARN
    Value: !Ref OnPremNfsLocation

  DestinationLocationArn:
    Description: DataSync S3 destination location ARN
    Value: !Ref S3DestinationLocation

  TaskArn:
    Description: DataSync task ARN
    Value: !Ref DataMigrationTask
